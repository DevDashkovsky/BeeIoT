  # ==================== MQTT ====================
  /mqtt/config:
    post:
      tags: [MQTT]
      summary: Отправка конфигурации на датчик 🔒
      description: |
        **Требует middleware `CheckAuth`.**

        Отправляет конфигурацию на датчик через MQTT (топик `/device/{sensor}/config`, QoS 1).
        Позволяет задать частоту сбора данных, перезагрузку устройства и другие параметры.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceConfigRequest'
      responses:
        '200':
          description: Конфигурация отправлена
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Конфигурация успешно отправлена
        '400':
          description: Имя датчика не указано
          content:
            text/plain:
              schema:
                type: string
                example: Имя датчика обязательно
        '500':
          description: Ошибка отправки конфигурации
          content:
            text/plain:
              schema:
                type: string
                example: Ошибка отправки конфигурации

  /mqtt/health:
    post:
      tags: [MQTT]
      summary: Отправка health check на датчик 🔒
      description: |
        **Требует middleware `CheckAuth`.**

        Отправляет запрос на проверку состояния (health check) датчика через MQTT (топик `/device/{sensor}/config`, QoS 1).
        Отправляет конфигурацию с `health_check=true`, затем ожидает ответ от датчика (до 4 секунд).

        Публикация MQTT-сообщения выполняется в фоне (fire-and-forget): даже если HTTP-запрос
        истечёт по таймауту, сообщение останется в очереди MQTT-клиента и будет доставлено
        датчику при выходе из гибернации (QoS 1).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthCheckRequest'
      responses:
        '200':
          description: Датчик ответил — статус получен
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Health check выполнен успешно
                      data:
                        $ref: '#/components/schemas/DeviceStatus'
        '400':
          description: Имя датчика не указано
          content:
            text/plain:
              schema:
                type: string
                example: Имя датчика обязательно
        '504':
          description: Датчик не ответил в отведённое время (4 с)
          content:
            text/plain:
              schema:
                type: string
                example: Датчик не ответил на health check в отведённое время