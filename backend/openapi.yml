  # ==================== TELEMETRY ====================
  /telemetry/noise/get:
    get:
      tags: [Telemetry]
      summary: Получение данных шума 🔒
      description: |
        **Требует middleware `CheckAuth`.**

        Возвращает данные шума для улья с заданного момента времени.
        Данные выдаются с агрегацией по часам.
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Название улья
          example: Улей-1
        - name: since
          in: query
          required: false
          schema:
            type: integer
            format: int64
            example: 1708704000
          description: |
            Unix timestamp начала выборки (в секундах, не миллисекундах). Если не указан — последние 24 часа.
      responses:
        '200':
          description: Данные шума получены
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Данные шума успешно получены
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TelemetryDataPoint'
        '400':
          description: Параметр name не указан
          content:
            text/plain:
              schema:
                type: string
                example: Параметр "name" обязателен
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

