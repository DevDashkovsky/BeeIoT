        Удаляет улей текущего пользователя по имени.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteHive'
      responses:
        '200':
          description: Улей удалён
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Улей успешно удален
        '400':
          description: Пустое имя улья
          content:
            text/plain:
              schema:
                type: string
                example: Имя улья не может быть пустым
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
                  - Срок действия токена истек или он невалидный
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hive/link/hub:
    post:
      tags: [Hive]
      summary: Привязка хаба к улью 🔒
