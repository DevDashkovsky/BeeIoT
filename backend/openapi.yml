    get:
      tags: [Telemetry]
      summary: Получение данных веса 🔒
      description: |
        **Требует middleware `CheckAuth`.**

        Возвращает данные веса для улья с заданного момента времени.
        Данные выдаются с агрегацией по часам.
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Название улья
          example: Улей-1
        - name: since
          in: query
          required: false
          schema:
