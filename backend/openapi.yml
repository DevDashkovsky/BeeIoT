              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Календарь развития матки успешно рассчитан
                      data:
                        $ref: '#/components/schemas/QueenPhaseCalendar'
        '400':
          description: Неверный формат даты или JSON
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Неверный формат JSON
                  - Неверный формат даты
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
