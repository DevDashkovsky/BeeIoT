  /hive/update:
    put:
      tags: [Hive]
      summary: Обновление улья 🔒
      description: |
        **Требует middleware `CheckAuth`** (применён на весь роут `/hive`).

        Обновляет улей текущего пользователя:
        - Изменение имени (old_name → new_name) - если new_name не указан, остается старое имя
        - Статус активности (boolean: true/false) - если не указан, остается старое значение
        - Привязку к датчику - если sensor пустое или не указан, не изменяется
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
