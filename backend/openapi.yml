  # ==================== HIVE ====================
  /hive/create:
    post:
      tags: [Hive]
      summary: Создание улья 🔒
      description: |
        **Требует middleware `CheckAuth`** (применён на весь роут `/hive`).

        Создаёт новый улей для текущего пользователя.
        Опционально можно указать имя датчика для привязки к улью.
        Если датчик не найден у пользователя, улей создаётся без привязки.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHive'
      responses:
        '200':
          description: Улей создан
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Улей успешно создан
        '400':
          description: Неверный формат JSON
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
                  - Срок действия токена истек или он невалидный
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hive/list:
    get:
      tags: [Hive]
      summary: Список ульев 🔒
      description: |
        **Требует middleware `CheckAuth`** (применён на весь роут `/hive`).

        Возвращает ульи текущего пользователя.
        Можно фильтровать по статусу активности через query-параметр `active`.
      security:
        - BearerAuth: []
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Фильтр по статусу:
            - `true` — только активные ульи
            - `false` — только архивные ульи
            - не указан — все ульи
      responses:
        '200':
          description: Список ульев
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Список ульев успешно получен
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HiveListItem'
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
                  - Срок действия токена истек или он невалидный
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hive/:
    get:
      tags: [Hive]
      summary: Получение улья по имени 🔒
      description: |
        **Требует middleware `CheckAuth`** (применён на весь роут `/hive`).

        Возвращает информацию об улье по имени. Имя передаётся через query-параметр `name`.
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            example: Улей-1
          description: Название улья
        - name: active
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Фильтр по статусу:
            - `true` — вернуть только если улей активен
            - `false` — вернуть только если улей в архиве
            - не указан — вернуть в любом статусе
      responses:
        '200':
          description: Данные улья
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: Улей успешно получен
                      data:
                        $ref: '#/components/schemas/HiveDetails'
        '400':
          description: Параметр name не указан
          content:
            text/plain:
              schema:
                type: string
                example: Параметр name обязателен
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
                  - Срок действия токена истек или он невалидный
        '404':
          description: Улей не найден
          content:
            text/plain:
              schema:
                type: string
                example: Улей не найден
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hive/update:
    put:
      tags: [Hive]
      summary: Обновление улья 🔒
      description: |
        **Требует middleware `CheckAuth`** (применён на весь роут `/hive`).

        Обновляет улей текущего пользователя:
        - Изменение имени (old_name → new_name) - если new_name не указан, остается старое имя
        - Статус активности (boolean: true/false) - если не указан, остается старое значение
        - Привязку к датчику - если sensor пустое или не указан, не изменяется
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHive'
      responses:
        '200':
          description: Улей обновлён
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - properties:
                      message:
                        example: улей успешно обновлен
        '400':
          description: Пустое имя улья
          content:
            text/plain:
              schema:
                type: string
                example: Старое имя улья не может быть пустым
        '401':
          description: Не авторизован (middleware CheckAuth)
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - Отсутствует заголовок авторизации
                  - Неверный формат заголовка авторизации
                  - Пустой токен авторизации
                  - Срок действия токена истек или он невалидный
        '500':
          description: Внутренняя ошибка сервера
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

