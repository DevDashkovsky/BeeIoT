worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Общий лимит: 30 req/s на IP — останавливает DDoS-флуд.
    # Без этого один IP может вогнать Go-рантайм в гроб тысячами горутин.
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;

    # Лимит для auth: 5 req/min на IP — защита от брутфорса паролей.
    # Без этого злоумышленник может перебирать пароли со скоростью сети.
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Скрываем версию nginx в заголовках и страницах ошибок.
        # Иначе в ответе будет "Server: nginx/1.27.x" — подарок сканерам CVE.
        server_tokens off;

        # Максимальный размер тела запроса 10 MB.
        # Защита от атак с огромными телами, которые съедают RAM при парсинге.
        # 10 MB — достаточно для инструкций с большим текстом.
        client_max_body_size 10m;

        # Таймауты — защита от Slowloris и slow-read атак.
        # Slowloris держит соединения открытыми, слая данные по 1 байту в секунду,
        # и исчерпывает пул воркеров. Короткие таймауты убивают такие соединения.
        client_body_timeout    10s;
        client_header_timeout  10s;
        send_timeout           10s;
        keepalive_timeout      30s;

        # Docker-резолвер (встроенный DNS docker-compose сети).
        # Нужен чтобы nginx стартовал даже если go-server ещё не поднялся —
        # без этого nginx падает при старте с "host not found".
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "http://go-server:8000";

        # ── Общие настройки проксирования ─────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        # Скрываем заголовки бэкенда — не светим технологический стек.
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # ── Auth-эндпоинты: строгий лимит от брутфорса ────────────────────────
        # login, registration, change (смена пароля) — цели для брутфорса.
        # Здесь применяются ОБА лимита: общий (DDoS) + auth (брутфорс).
        location ~ ^/api/auth/(login|registration|change) {
            limit_req zone=api  burst=10 nodelay;
            limit_req zone=auth burst=3  nodelay;

            proxy_pass $backend;
        }

        # ── Основной API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass $backend;
        }

        # ── Всё остальное — 404 ───────────────────────────────────────────────
        # Go-сервер не должен получать запросы вне /api/.
        # Отрезаем сканеры, которые ищут /admin, /.env, /wp-login.php и т.п.
        location / {
            return 404;
        }
    }
}
